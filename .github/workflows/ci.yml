name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Typecheck workspaces
        run: npm run typecheck
      - name: Test calculator
        run: npm --workspace @40k-calculator/calculator run test
      - name: Test catalog validation
        run: npm --workspace @40k-calculator/game-data-schema exec vitest run src/validation.test.ts
      - name: Test release validation
        run: npm --workspace @40k-calculator/game-data-schema exec vitest run src/release-validation.test.ts
      - name: Test common chunk parsing
        run: npm --workspace @40k-calculator/game-data-schema exec vitest run src/chunk-validation.test.ts -t "parses and freezes common entities"
      - name: Test common release matching
        run: npm --workspace @40k-calculator/game-data-schema exec vitest run src/chunk-validation.test.ts -t "rejects top-level release IDs"
      - name: Test common references
        run: npm --workspace @40k-calculator/game-data-schema exec vitest run src/chunk-validation.test.ts -t "rejects broken common references"
      - name: Test faction chunks
        run: npm --workspace @40k-calculator/game-data-schema exec vitest run src/chunk-validation.test.ts -t parseFactionDataChunk
      - name: Test chunk catalog assembly
        run: npm --workspace @40k-calculator/game-data-schema exec vitest run src/chunk-validation.test.ts -t assembleGameDataCatalog
      - name: Test web application
        run: npm --workspace @40k-calculator/web run test
      - name: Verify data release
        run: npm run verify:data-release
      - name: Build web application
        run: npm run build
