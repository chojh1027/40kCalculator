name: Debug check

on:
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Capture project checks
        run: npm run check > ci-output.txt 2>&1 || true
      - name: Upload check output
        uses: actions/upload-artifact@v6
        with:
          name: ci-output
          path: ci-output.txt
